<html lang="en">

<meta charset="UTF-8">

<title>BIZUSIZO Check-In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column}
.header{background:#1e40af;color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:28px;font-weight:800;letter-spacing:1px}
.header p{font-size:14px;opacity:.8;margin-top:2px}
.body{flex:1;padding:16px;max-width:600px;margin:0 auto;width:100%}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:20px;color:#1e40af;margin-bottom:12px;text-align:center}
.card p{font-size:15px;color:#4b5563;text-align:center;margin-bottom:16px;line-height:1.5}
.btn-grid{display:grid;gap:10px}
.btn-grid.cols-2{grid-template-columns:1fr 1fr}
.btn-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px 16px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;font-size:16px;font-weight:600;color:#1f2937;cursor:pointer;transition:all .15s;text-align:center;min-height:60px;line-height:1.3}
.btn:active{transform:scale(.97);background:#eff6ff;border-color:#3b82f6}
.btn.selected{background:#eff6ff;border-color:#3b82f6;color:#1e40af}
.btn-primary{background:#1e40af;color:#fff;border-color:#1e40af;font-size:18px;padding:20px;border-radius:12px;width:100%;font-weight:700;cursor:pointer;margin-top:12px}
.btn-primary:active{background:#1e3a8a;transform:scale(.98)}
.btn-primary:disabled{background:#94a3b8;border-color:#94a3b8}
.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}
.btn-danger:active{background:#b91c1c}
.btn-secondary{background:#64748b;color:#fff;border-color:#64748b;font-size:16px;padding:16px;border-radius:12px;width:100%;font-weight:600;cursor:pointer;margin-top:8px}
.btn-secondary:active{background:#475569;transform:scale(.98)}
.input{width:100%;padding:16px;border-radius:12px;border:2px solid #e5e7eb;font-size:18px;outline:none;margin-bottom:10px}
.input:focus{border-color:#3b82f6}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.label{font-size:13px;color:#6b7280;margin-bottom:4px;font-weight:600}
.badge{display:inline-block;padding:6px 16px;border-radius:99px;font-size:16px;font-weight:700}
.badge-red{background:#fef2f2;color:#dc2626;border:2px solid #fecaca}
.badge-orange{background:#fff7ed;color:#ea580c;border:2px solid #fed7aa}
.badge-yellow{background:#fefce8;color:#ca8a04;border:2px solid #fef08a}
.badge-green{background:#f0fdf4;color:#16a34a;border:2px solid #bbf7d0}
.result-box{text-align:center;padding:24px}
.result-box .emoji{font-size:48px;margin-bottom:12px}
.result-box h3{font-size:22px;margin-bottom:8px}
.result-box p{font-size:15px;color:#4b5563;line-height:1.6}
.ref-num{font-size:32px;font-weight:800;color:#1e40af;margin:16px 0;letter-spacing:2px}
.progress{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.progress .dot{width:10px;height:10px;border-radius:99px;background:#e5e7eb}
.progress .dot.active{background:#1e40af}
.progress .dot.done{background:#22c55e}
.footer{text-align:center;padding:12px;font-size:11px;color:#9ca3af}
.hidden{display:none}
.back-btn{font-size:13px;color:#6b7280;cursor:pointer;text-align:center;margin-top:8px;padding:8px}
.consent-list{text-align:left;margin:12px 0 20px;padding-left:8px}
.consent-list li{font-size:15px;color:#374151;margin-bottom:10px;line-height:1.5;list-style:none;padding-left:24px;position:relative}
.consent-list li::before{content:'\2713';position:absolute;left:0;color:#16a34a;font-weight:700}
.checkbox-grid{display:grid;gap:10px;text-align:left}
.checkbox-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;cursor:pointer;font-size:15px;color:#1f2937;line-height:1.4}
.checkbox-item input[type="checkbox"]{width:24px;height:24px;flex-shrink:0}
.checkbox-item.checked{border-color:#dc2626;background:#fef2f2}
.deletion-notice{font-size:12px;color:#9ca3af;text-align:center;margin-top:16px;padding:8px;border-top:1px solid #f3f4f6}
</style>
</head>

function t(key){ return (T[state.language]||T.en)[key] || T.en[key] || key; }
function el(id){ return document.getElementById(id); }
function render(html){ document.getElementById('app').innerHTML = html; }

function progress(current, total){
  let dots = '';
  for(let i=0;i<total;i++){
    dots += '<div class="dot '+(i<current?'done':i===current?'active':'')+'"></div>';
  }
  return '<div class="progress">'+dots+'</div>';
}

        '<p style="font-size:14px;color:#15803d"><b>Queue:</b> '+(data.queue_type||'General')+'</p>'+

function showIMCI(){
  state.step='imci';
  var signs = ['imci_1','imci_2','imci_3','imci_4','imci_5','imci_6'];
  render(progress(3,7)+'<div class="card"><h2>'+t('imci_title')+'</h2>'+
    '<div class="checkbox-grid" id="imci-grid">'+
    signs.map((s,i)=>'<label class="checkbox-item" id="imci-item-'+i+'" onclick="toggleIMCI('+i+')"><input type="checkbox" id="imci-'+i+'" onclick="event.stopPropagation();toggleIMCI('+i+')"> '+t(s)+'</label>').join('')+
    '</div>'+
    '<button class="btn-primary" onclick="submitIMCI(true)">'+t('imci_none')+' \u2192 '+t('next')+'</button>'+
    '<button class="btn-primary btn-danger" style="margin-top:8px" id="imci-alert-btn" onclick="submitIMCI(false)" disabled>'+t('next')+' (danger signs selected)</button>'+
    '<div class="back-btn" onclick="showCategory()">'+t('back')+'</div></div>');
}

function toggleIMCI(idx){
  var cb = document.getElementById('imci-'+idx);
  var item = document.getElementById('imci-item-'+idx);
  if(cb){
    // Toggle if triggered from label click
    if(event && event.target!==cb) cb.checked=!cb.checked;
    item.className = cb.checked ? 'checkbox-item checked' : 'checkbox-item';
  }
  // Enable/disable alert button
  var anyChecked = false;
  for(var i=0;i<6;i++){
    var c=document.getElementById('imci-'+i);
    if(c&&c.checked) anyChecked=true;
  }
  document.getElementById('imci-alert-btn').disabled = !anyChecked;
}

function submitIMCI(noneSelected){
  if(!noneSelected){
    // Danger signs selected — submit as RED/ORANGE directly
    var checkedSigns = [];
    var signKeys = ['imci_1','imci_2','imci_3','imci_4','imci_5','imci_6'];
    for(var i=0;i<6;i++){
      var c=document.getElementById('imci-'+i);
      if(c&&c.checked) checkedSigns.push(t(signKeys[i]));
    }
    if(checkedSigns.length===0) return;
    state.severity='severe';
    state.symptoms='IMCI danger signs: '+checkedSigns.join(', ');
    state.pathway='imci_danger';
    submitTriage();
  } else {
    // No danger signs — proceed to severity
    showSeverity();
  }
}

  } else if(option==='supplements'){
    state.severity='mild';
    state.symptoms='ANC supplements collection only';
    state.pathway='anc_supplements';
    submitTriage();
  } else {
    // concern — proceed to severity
    showSeverity();
  }
}

async function submitTriage(){
  var symptomsEl = document.getElementById('symptoms');
  if(symptomsEl){
    state.symptoms = symptomsEl.value.trim() || state.symptoms;
  }

  render(progress(5,7)+'<div class="card"><div class="result-box"><div class="emoji">\u23F3</div><h3>'+t('checking')+'</h3></div></div>');

  var body = {
    firstName: state.firstName,
    surname: state.surname,
    dob: state.dob,
    sex: state.sex,
    category: state.category,
    categoryName: state.categoryName,
    severity: state.severity,
    symptoms: state.symptoms,
    language: state.language,
  };
  if(state.pathway) body.pathway = state.pathway;

  try {
    const res = await fetch(API+'/api/kiosk/triage', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-kiosk-pin':kioskPin},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if(data.success){
      state.triageResult = data.triage_level;
      state.refCode = data.ref_code;
      showResult(data);
    } else {
      showError();
    }
  } catch(e){
    showError();
  }
}

    '<p style="font-size:13px;color:#6b7280">'+t('show_reception')+'</p>'+
    '<div class="ref-num">'+data.ref_code+'</div>'+
    '<p style="font-size:14px;color:#1f2937"><b>'+state.firstName+' '+state.surname+'</b></p>'+
    '<p style="font-size:13px;color:#6b7280">Queue: #'+(data.queue_position||'\u2014')+' \u2014 '+(labels[level]||'')+'</p>'+
    '</div>'+
    (level!=='RED'?'<p style="margin-top:12px;font-size:14px;color:#4b5563">'+t('your_turn')+'</p>':'')+
    '</div></div>'+
    // CHANGE 7: Optional phone number for WhatsApp follow-up
    '<div class="card" id="followup-card">'+
    '<p style="font-size:14px;color:#374151;font-weight:600;text-align:center">'+t('followup_prompt')+'</p>'+
    '<input class="input" id="followup-phone" type="tel" inputmode="tel" placeholder="e.g. 0712345678" autocomplete="off" style="text-align:center">'+
    '<div class="btn-grid cols-2">'+
    '<div class="btn" style="border-color:#22c55e" onclick="submitFollowup()">'+t('followup_send')+'</div>'+
    '<div class="btn" onclick="skipFollowup()">'+t('followup_skip')+'</div>'+
    '</div>'+
    '</div>'+
    // CHANGE 8: Consent withdrawal / deletion notice
    '<div class="deletion-notice">'+t('deletion_notice')+'</div>'+
    '<button class="btn-primary" style="background:#64748b;border-color:#64748b" onclick="resetKiosk()">'+t('start_over')+'</button>');

  // Auto-reset after 90 seconds (longer to allow phone entry)
  setTimeout(()=>{ if(state.step==='result') resetKiosk(); }, 90000);
  state.step='result';
}

// CHANGE 7: Follow-up phone submission
async function submitFollowup(){
  var phone = document.getElementById('followup-phone').value.trim();
  if(!phone){
    document.getElementById('followup-phone').style.borderColor='#ef4444';
    return;
  }
  state.phone = phone;
  // Re-submit with phone number
  try {
    await fetch(API+'/api/kiosk/triage', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-kiosk-pin':kioskPin},
      body: JSON.stringify({
        firstName: state.firstName,
        surname: state.surname,
        dob: state.dob,
        sex: state.sex,
        category: state.category,
        categoryName: state.categoryName,
        severity: state.severity,
        symptoms: state.symptoms,
        language: state.language,
        pathway: state.pathway,
        phone: phone,
        ref_code: state.refCode,
        followup_only: true,
      })
    });
  } catch(e){}
  var card = document.getElementById('followup-card');
  if(card) card.innerHTML = '<p style="color:#16a34a;font-weight:600;text-align:center">\u2713 '+t('followup_send')+'</p>';
}

function skipFollowup(){
  var card = document.getElementById('followup-card');
  if(card) card.style.display='none';
}

function showError(){
  render('<div class="card"><div class="result-box">'+
    '<div class="emoji">\u26A0\uFE0F</div>'+
    '<h3>Something went wrong</h3>'+
    '<p>Please ask reception to register you manually.</p>'+
    '</div></div>'+
    '<button class="btn-primary" onclick="resetKiosk()">Try Again</button>');
}

function resetKiosk(){
  state = { step:'language', language:'en', firstName:'', surname:'', dob:'', sex:'', symptoms:'', category:'', severity:'', triageResult:null, refCode:'', pathway:'', phone:'' };
  showLanguage();
}

// -- Facility PIN gate --
function showPinScreen(errorMsg){
  render('<div class="card" style="max-width:400px;margin:40px auto">'+
    '<h2 style="margin-bottom:4px">BIZUSIZO Kiosk</h2>'+
    '<p style="font-size:13px;color:#6b7280;margin-bottom:20px">Staff: enter the facility PIN to unlock</p>'+
    '<input class="input" id="kiosk-pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="Facility PIN" style="text-align:center;font-size:24px;letter-spacing:8px" onkeyup="if(event.key===\'Enter\')verifyPin()">'+
    (errorMsg?'<p style="color:#dc2626;font-size:13px;text-align:center;margin-bottom:8px">'+errorMsg+'</p>':'')+
    '<button class="btn-primary" onclick="verifyPin()">Unlock Kiosk</button>'+
    '</div>');
  setTimeout(()=>{var e=document.getElementById('kiosk-pin');if(e)e.focus();},100);
}

async function verifyPin(){
  var pin=document.getElementById('kiosk-pin').value.trim();
  if(!pin){showPinScreen('Please enter the PIN');return;}
  try{
    var r=await fetch(API+'/api/kiosk/verify-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})});
    if(r.ok){kioskUnlocked=true;kioskPin=pin;showLanguage();}
    else{showPinScreen('Incorrect PIN. Ask the facility manager.');}
  }catch(e){showPinScreen('Connection error. Try again.');}
}

async function initKiosk(){
  try{
    var r=await fetch(API+'/api/kiosk/requires-pin');
    var d=await r.json();
    if(d.requiresPin){showPinScreen();}
    else{kioskUnlocked=true;showLanguage();}
  }catch(e){showLanguage();}
}

// Start
initKiosk();
</script>
</body>
</html>
